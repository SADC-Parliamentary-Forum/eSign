version: '3.9'

services:
  # =============================================================================
  # API Gateway - Traefik
  # =============================================================================
  traefik:
    image: traefik:v3
    container_name: sadc_esign_gateway
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
      - "8888:8080"  # Traefik Dashboard
    volumes:
      - //var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - sadc_esign_network

  # =============================================================================
  # Unified App (Laravel + Vue)
  # =============================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sadc_esign_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
      - /var/www/html/frontend/node_modules
      - /var/www/html/backend/node_modules
    ports:
      - "8000:8000"
      - "5173:5173"
      - "8080:8080"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=sadc_esign
      - DB_USERNAME=sadc_esign
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=documents
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    labels:
      # Backend Routing
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`localhost`) && PathPrefix(`/api`, `/storage`, `/telescope`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
      
      # Frontend Routing (Catch-all)
      - "traefik.http.routers.frontend.rule=Host(`localhost`) && !PathPrefix(`/api`, `/storage`, `/telescope`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=5173"
    networks:
      - sadc_esign_network

  # =============================================================================
  # PostgreSQL Database
  # =============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: sadc_esign_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sadc_esign
      POSTGRES_USER: sadc_esign
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sadc_esign -d sadc_esign"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sadc_esign_network

  # =============================================================================
  # Redis Cache
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: sadc_esign_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sadc_esign_network

  # =============================================================================
  # MinIO Object Storage (S3-compatible)
  # =============================================================================
  minio:
    image: minio/minio:latest
    container_name: sadc_esign_minio
    restart: unless-stopped
    command: server /data --console-address ":9091"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9091:9091"  # MinIO Console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - sadc_esign_network

  # =============================================================================
  # Mailpit - Email Testing
  # =============================================================================
  mailpit:
    image: axllent/mailpit
    container_name: sadc_esign_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"  # Web UI
      - "1025:1025"  # SMTP
    networks:
      - sadc_esign_network

# =============================================================================
# Networks
# =============================================================================
networks:
  sadc_esign_network:
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
  redis_data:
  minio_data:
