version: '3.9'

services:
  # Nginx - Internal Web Server (Behind Host Proxy)
  nginx:
    image: nginx:alpine
    container_name: esign_nginx
    restart: unless-stopped
    ports:
      - "8000:80"  # Expose on 8000 for the host Reverse Proxy
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../backend:/var/www/html
      - ../frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - app
    networks:
      - esign_network

  # Laravel App (PHP-FPM)
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: esign_app
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - ../backend:/var/www/html
      - ../backend/storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - esign_network

  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: esign_postgres
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - esign_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sadc_esign"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - esign_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: esign_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - esign_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - esign_network

networks:
  esign_network:
    driver: bridge

volumes:
  esign_db_data:
  esign_redis_data:
