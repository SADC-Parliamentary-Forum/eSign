<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SMS OTP Verification Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "primary-content": "#ffffff",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1a2233",
                        "neutral-light": "#e2e8f0",
                        "neutral-dark": "#2d3748",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"],
                        "sans": ["Public Sans", "sans-serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        /* Custom Keypad Press Effect */
        .keypad-btn:active {
            background-color: rgba(0, 0, 0, 0.1);
        }
        .dark .keypad-btn:active {
            background-color: rgba(255, 255, 255, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col antialiased">
<!-- Top Navigation Bar -->
<div class="sticky top-0 z-50 flex items-center justify-between px-4 py-3 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
<button class="flex items-center justify-center p-2 -ml-2 rounded-full text-slate-700 dark:text-slate-200 hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined !text-[28px]">chevron_left</span>
</button>
<h2 class="text-lg font-bold tracking-tight text-center flex-1 pr-8">Security Verification</h2>
</div>
<!-- Main Content Area -->
<div class="flex-1 flex flex-col items-center px-6 pt-8 pb-4 max-w-md mx-auto w-full">
<!-- Security Badge -->
<div class="flex flex-col items-center gap-3 mb-8">
<div class="relative flex items-center justify-center size-16 rounded-full bg-primary/10 dark:bg-primary/20 text-primary animate-pulse-slow">
<span class="material-symbols-outlined !text-[32px]">shield_lock</span>
<div class="absolute -bottom-1 -right-1 bg-green-500 rounded-full p-1 border-2 border-background-light dark:border-background-dark">
<span class="material-symbols-outlined !text-[12px] text-white font-bold">check</span>
</div>
</div>
<span class="text-sm font-semibold text-primary uppercase tracking-wider bg-primary/5 px-3 py-1 rounded-full border border-primary/10">Advanced Security Document</span>
</div>
<!-- Headings -->
<div class="text-center mb-8">
<h1 class="text-3xl font-bold mb-3 text-slate-900 dark:text-white">Verify Identity</h1>
<p class="text-slate-500 dark:text-slate-400 text-base leading-relaxed max-w-[280px] mx-auto">
                Enter the 6-digit code sent to your mobile device ending in <strong class="text-slate-900 dark:text-slate-200">**89</strong>.
            </p>
</div>
<!-- OTP Input Fields -->
<div class="flex justify-center w-full mb-8">
<fieldset class="flex gap-2 sm:gap-3">
<input autofocus="" class="w-11 h-14 sm:w-12 sm:h-16 text-center text-2xl font-semibold bg-surface-light dark:bg-surface-dark border-2 border-slate-200 dark:border-slate-700 rounded-lg focus:border-primary focus:ring-0 focus:outline-none transition-all shadow-sm caret-primary" maxlength="1" type="tel" value="5"/>
<input class="w-11 h-14 sm:w-12 sm:h-16 text-center text-2xl font-semibold bg-surface-light dark:bg-surface-dark border-2 border-slate-200 dark:border-slate-700 rounded-lg focus:border-primary focus:ring-0 focus:outline-none transition-all shadow-sm caret-primary" maxlength="1" type="tel" value="2"/>
<input class="w-11 h-14 sm:w-12 sm:h-16 text-center text-2xl font-semibold bg-surface-light dark:bg-surface-dark border-2 border-primary ring-2 ring-primary/20 rounded-lg focus:border-primary focus:ring-0 focus:outline-none transition-all shadow-sm caret-primary" maxlength="1" type="tel"/>
<input class="w-11 h-14 sm:w-12 sm:h-16 text-center text-2xl font-semibold bg-surface-light dark:bg-surface-dark border-2 border-slate-200 dark:border-slate-700 rounded-lg focus:border-primary focus:ring-0 focus:outline-none transition-all shadow-sm caret-primary" maxlength="1" type="tel"/>
<input class="w-11 h-14 sm:w-12 sm:h-16 text-center text-2xl font-semibold bg-surface-light dark:bg-surface-dark border-2 border-slate-200 dark:border-slate-700 rounded-lg focus:border-primary focus:ring-0 focus:outline-none transition-all shadow-sm caret-primary" maxlength="1" type="tel"/>
<input class="w-11 h-14 sm:w-12 sm:h-16 text-center text-2xl font-semibold bg-surface-light dark:bg-surface-dark border-2 border-slate-200 dark:border-slate-700 rounded-lg focus:border-primary focus:ring-0 focus:outline-none transition-all shadow-sm caret-primary" maxlength="1" type="tel"/>
</fieldset>
</div>
<!-- Resend Link -->
<div class="text-center mb-8">
<p class="text-sm text-slate-500 dark:text-slate-400">
                Didn't receive the code? 
                <button class="font-semibold text-primary hover:text-blue-700 transition-colors ml-1">Resend Code</button>
</p>
<p class="text-xs text-slate-400 dark:text-slate-500 mt-2">Resend available in 00:24</p>
</div>
<!-- Verify Button -->
<button class="w-full py-4 bg-primary hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg shadow-primary/30 transition-all transform active:scale-[0.98] flex items-center justify-center gap-2 mb-4 group disabled:opacity-50 disabled:cursor-not-allowed">
<span>Verify &amp; Continue</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform !text-[20px]">arrow_forward</span>
</button>
</div>
<!-- Numeric Keypad Area (Simulated iOS Keypad) -->
<div class="bg-slate-100 dark:bg-surface-dark pb-8 pt-4 rounded-t-3xl shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] border-t border-slate-200 dark:border-slate-800">
<!-- iOS Auto-fill Suggestion Strip Simulation -->
<div class="flex justify-center mb-4 border-b border-slate-200 dark:border-slate-700 pb-2 mx-4">
<div class="flex flex-col items-center py-1 px-4">
<span class="text-xs text-slate-400 uppercase tracking-wide">From Messages</span>
<span class="text-base font-medium text-slate-800 dark:text-slate-200">529-104</span>
</div>
</div>
<div class="max-w-md mx-auto px-6">
<div class="grid grid-cols-3 gap-y-5 gap-x-6">
<!-- Row 1 -->
<button class="keypad-btn h-14 w-full rounded-lg flex flex-col items-center justify-center transition-colors">
<span class="text-2xl font-medium text-slate-900 dark:text-slate-100">1</span>
<span class="text-[9px] font-bold tracking-[2px] text-transparent h-3">ABC</span> <!-- Spacer for alignment -->
</button>
<button class="keypad-btn h-14 w-full rounded-lg flex flex-col items-center justify-center transition-colors">
<span class="text-2xl font-medium text-slate-900 dark:text-slate-100">2</span>
<span class="text-[9px] font-bold tracking-[2px] text-slate-400 dark:text-slate-500 uppercase h-3">ABC</span>
</button>
<button class="keypad-btn h-14 w-full rounded-lg flex flex-col items-center justify-center transition-colors">
<span class="text-2xl font-medium text-slate-900 dark:text-slate-100">3</span>
<span class="text-[9px] font-bold tracking-[2px] text-slate-400 dark:text-slate-500 uppercase h-3">DEF</span>
</button>
<!-- Row 2 -->
<button class="keypad-btn h-14 w-full rounded-lg flex flex-col items-center justify-center transition-colors">
<span class="text-2xl font-medium text-slate-900 dark:text-slate-100">4</span>
<span class="text-[9px] font-bold tracking-[2px] text-slate-400 dark:text-slate-500 uppercase h-3">GHI</span>
</button>
<button class="keypad-btn h-14 w-full rounded-lg flex flex-col items-center justify-center transition-colors">
<span class="text-2xl font-medium text-slate-900 dark:text-slate-100">5</span>
<span class="text-[9px] font-bold tracking-[2px] text-slate-400 dark:text-slate-500 uppercase h-3">JKL</span>
</button>
<button class="keypad-btn h-14 w-full rounded-lg flex flex-col items-center justify-center transition-colors">
<span class="text-2xl font-medium text-slate-900 dark:text-slate-100">6</span>
<span class="text-[9px] font-bold tracking-[2px] text-slate-400 dark:text-slate-500 uppercase h-3">MNO</span>
</button>
<!-- Row 3 -->
<button class="keypad-btn h-14 w-full rounded-lg flex flex-col items-center justify-center transition-colors">
<span class="text-2xl font-medium text-slate-900 dark:text-slate-100">7</span>
<span class="text-[9px] font-bold tracking-[2px] text-slate-400 dark:text-slate-500 uppercase h-3">PQRS</span>
</button>
<button class="keypad-btn h-14 w-full rounded-lg flex flex-col items-center justify-center transition-colors">
<span class="text-2xl font-medium text-slate-900 dark:text-slate-100">8</span>
<span class="text-[9px] font-bold tracking-[2px] text-slate-400 dark:text-slate-500 uppercase h-3">TUV</span>
</button>
<button class="keypad-btn h-14 w-full rounded-lg flex flex-col items-center justify-center transition-colors">
<span class="text-2xl font-medium text-slate-900 dark:text-slate-100">9</span>
<span class="text-[9px] font-bold tracking-[2px] text-slate-400 dark:text-slate-500 uppercase h-3">WXYZ</span>
</button>
<!-- Row 4 -->
<div class="h-14 w-full"></div> <!-- Empty spacer -->
<button class="keypad-btn h-14 w-full rounded-lg flex flex-col items-center justify-center transition-colors">
<span class="text-2xl font-medium text-slate-900 dark:text-slate-100">0</span>
<span class="text-[9px] font-bold tracking-[2px] text-slate-400 dark:text-slate-500 uppercase h-3">+</span>
</button>
<button class="keypad-btn h-14 w-full rounded-lg flex flex-col items-center justify-center transition-colors group">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100 group-active:scale-90 transition-transform">backspace</span>
</button>
</div>
</div>
</div>
</body></html>
