<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Profile &amp; Settings</title>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col items-center">
<!-- Mobile Container mimicking iOS Viewport -->
<div class="w-full max-w-md bg-background-light dark:bg-background-dark min-h-screen relative shadow-2xl overflow-hidden flex flex-col">
<!-- Header -->
<header class="flex items-center justify-between px-4 py-3 bg-background-light dark:bg-background-dark sticky top-0 z-10 backdrop-blur-md bg-opacity-95 dark:bg-opacity-95 border-b border-slate-200 dark:border-slate-800">
<button class="p-2 -ml-2 rounded-full text-slate-900 dark:text-slate-100 hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-2xl">menu</span>
</button>
<h1 class="text-base font-bold text-slate-900 dark:text-slate-100 tracking-tight">Profile &amp; Settings</h1>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<!-- Main Content -->
<main class="flex-1 overflow-y-auto px-4 pb-8">
<!-- Profile Card -->
<section class="mt-6 mb-8 flex flex-col items-center">
<div class="relative group">
<div class="w-24 h-24 rounded-full bg-slate-200 dark:bg-slate-700 overflow-hidden ring-4 ring-white dark:ring-slate-800 shadow-lg" data-alt="Professional woman portrait" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDSa4ftdVzKLjg5haq3xQBfcUBBX3aMQ0N8aohHbOwnbLRkF_gHWslLEphGzAVo7QDEN_SYlwKMH8HCKVFOnlx7-C8_XqDJlX80ECPplrgbi4MDWOqXllKBZwyZ8b35dpm2o6EnMBZSlyg_01kdzqvI8pdQ0m9zgRQiQoVmUhzFUeBj96G-X2Y2O7NSTmKySV2-dJ5_ca0FPrQV74HYfU-335QSE-rhoAPL3UlDvXxnGSglre2mH570OsRz6g21tJKPzYmzxww4TQPB'); background-size: cover; background-position: center;">
</div>
<div aria-label="Online Status" class="absolute bottom-0 right-0 bg-green-500 w-6 h-6 rounded-full border-4 border-white dark:border-slate-800"></div>
</div>
<div class="mt-4 text-center">
<h2 class="text-xl font-bold text-slate-900 dark:text-slate-100">Jane Doe</h2>
<p class="text-sm font-medium text-primary mt-1">Administrator</p>
<div class="flex items-center justify-center gap-1 mt-1 text-slate-500 dark:text-slate-400 text-sm">
<span class="material-symbols-outlined text-[16px]">account_balance</span>
<span>Department of Justice</span>
<span class="material-symbols-outlined text-[16px] text-blue-500 ml-1" title="Verified Organization">verified</span>
</div>
</div>
</section>
<!-- Group: Security & Audit -->
<div class="mb-6">
<h3 class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2 ml-1">Security &amp; Compliance</h3>
<div class="bg-white dark:bg-[#1e2736] rounded-xl overflow-hidden shadow-sm border border-slate-100 dark:border-slate-700/50">
<!-- Item 1 -->
<button class="w-full flex items-center justify-between p-4 hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors group border-b border-slate-100 dark:border-slate-700/50">
<div class="flex items-center gap-3">
<div class="w-9 h-9 rounded-lg bg-blue-50 dark:bg-blue-900/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[20px]">shield_lock</span>
</div>
<span class="text-slate-900 dark:text-slate-100 font-medium text-sm">Security Settings</span>
</div>
<span class="material-symbols-outlined text-slate-400 text-[20px] group-hover:text-primary transition-colors">chevron_right</span>
</button>
<!-- Item 2 -->
<button class="w-full flex items-center justify-between p-4 hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors group">
<div class="flex items-center gap-3">
<div class="w-9 h-9 rounded-lg bg-blue-50 dark:bg-blue-900/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[20px]">content_paste_search</span>
</div>
<span class="text-slate-900 dark:text-slate-100 font-medium text-sm">Audit Logs</span>
</div>
<span class="material-symbols-outlined text-slate-400 text-[20px] group-hover:text-primary transition-colors">chevron_right</span>
</button>
</div>
</div>
<!-- Group: Account Management -->
<div class="mb-6">
<h3 class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2 ml-1">Account Management</h3>
<div class="bg-white dark:bg-[#1e2736] rounded-xl overflow-hidden shadow-sm border border-slate-100 dark:border-slate-700/50">
<!-- Item 1 -->
<button class="w-full flex items-center justify-between p-4 hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors group border-b border-slate-100 dark:border-slate-700/50">
<div class="flex items-center gap-3">
<div class="w-9 h-9 rounded-lg bg-blue-50 dark:bg-blue-900/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[20px]">credit_card</span>
</div>
<div class="flex flex-col items-start">
<span class="text-slate-900 dark:text-slate-100 font-medium text-sm">Billing &amp; Subscription</span>
<span class="text-xs text-slate-400">Next invoice: Oct 24</span>
</div>
</div>
<span class="material-symbols-outlined text-slate-400 text-[20px] group-hover:text-primary transition-colors">chevron_right</span>
</button>
<!-- Item 2 -->
<button class="w-full flex items-center justify-between p-4 hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors group">
<div class="flex items-center gap-3">
<div class="w-9 h-9 rounded-lg bg-blue-50 dark:bg-blue-900/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[20px]">api</span>
</div>
<span class="text-slate-900 dark:text-slate-100 font-medium text-sm">API Integrations</span>
</div>
<span class="material-symbols-outlined text-slate-400 text-[20px] group-hover:text-primary transition-colors">chevron_right</span>
</button>
</div>
</div>
<!-- Group: Preferences -->
<div class="mb-8">
<h3 class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2 ml-1">App Preferences</h3>
<div class="bg-white dark:bg-[#1e2736] rounded-xl overflow-hidden shadow-sm border border-slate-100 dark:border-slate-700/50">
<button class="w-full flex items-center justify-between p-4 hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors group border-b border-slate-100 dark:border-slate-700/50">
<div class="flex items-center gap-3">
<div class="w-9 h-9 rounded-lg bg-blue-50 dark:bg-blue-900/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[20px]">notifications</span>
</div>
<span class="text-slate-900 dark:text-slate-100 font-medium text-sm">Notifications</span>
</div>
<span class="material-symbols-outlined text-slate-400 text-[20px] group-hover:text-primary transition-colors">chevron_right</span>
</button>
<div class="w-full flex items-center justify-between p-4 bg-white dark:bg-[#1e2736]">
<div class="flex items-center gap-3">
<div class="w-9 h-9 rounded-lg bg-blue-50 dark:bg-blue-900/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[20px]">dark_mode</span>
</div>
<span class="text-slate-900 dark:text-slate-100 font-medium text-sm">Dark Mode</span>
</div>
<div class="relative inline-block w-11 h-6 align-middle select-none transition duration-200 ease-in">
<input class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer border-slate-300 left-0.5 top-0.5 checked:right-0.5 checked:left-auto" id="toggle" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-slate-200 cursor-pointer" for="toggle"></label>
</div>
</div>
</div>
</div>
<!-- Sign Out Action -->
<button class="w-full bg-white dark:bg-[#1e2736] text-red-600 hover:text-red-700 hover:bg-red-50 dark:hover:bg-red-900/20 py-3.5 rounded-xl font-semibold text-sm shadow-sm border border-red-100 dark:border-red-900/30 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">logout</span>
                Sign Out
            </button>
<!-- Version Info -->
<div class="mt-6 text-center">
<p class="text-xs text-slate-400 dark:text-slate-600">eSign Pro v2.4.1 (Build 204)</p>
</div>
</main>
<!-- Hamburger Menu Overlay (Simulated Closed State/Hidden for now, but ready structure) -->
<!-- In a real implementation, this would slide in -->
<!-- <div class="fixed inset-0 bg-black/50 z-40 hidden"></div>
        <div class="fixed inset-y-0 left-0 w-64 bg-white dark:bg-background-dark shadow-2xl z-50 transform -translate-x-full transition-transform duration-300">
             Menu Content
        </div> -->
</div>
<style>
        /* Custom Styles for Toggle Switch since Tailwind Forms plugin might need specific config or raw css is easier for simple switch */
        .toggle-checkbox:checked {
            right: 0.5rem;
            border-color: #135bec;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #135bec;
        }
    </style>
</body></html>
