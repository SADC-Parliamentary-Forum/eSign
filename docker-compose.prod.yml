version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/production/Dockerfile
    image: esign-app-prod:latest
    container_name: esign_app_prod
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_URL: https://esign.sadcpf.org
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: esign
      DB_USERNAME: esign_user
      DB_PASSWORD: secure_password
      REDIS_HOST: redis
      REDIS_PASSWORD: null
      REDIS_PORT: 6379
    depends_on:
      - db
      - redis
    networks:
      - esign-prod-network

  db:
    image: mysql:8.0
    container_name: esign_db_prod
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: esign
      MYSQL_USER: esign_user
      MYSQL_PASSWORD: secure_password
      MYSQL_ROOT_PASSWORD: root_secure_password
    volumes:
      - db_data_prod:/var/lib/mysql
    networks:
      - esign-prod-network

  redis:
    image: redis:alpine
    container_name: esign_redis_prod
    restart: unless-stopped
    networks:
      - esign-prod-network

networks:
  esign-prod-network:
    driver: bridge

volumes:
  db_data_prod:
