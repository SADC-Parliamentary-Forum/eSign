services:
  # Nginx - Production Web Server
  nginx:
    image: nginx:alpine
    container_name: esign_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:

      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - public_data:/var/www/html/public:ro
      - storage_data:/var/www/html/storage/app/public:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - esign-prod-network

  # Laravel App (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: docker/production/Dockerfile
    image: esign-app-prod:latest
    container_name: esign_app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f -s http://127.0.0.1:3000/up || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 90s
      retries: 3
    working_dir: /var/www/html
    volumes:
      - public_data:/var/www/html/public
      - ./storage:/var/www/html/storage
      - storage_data:/var/www/html/storage/app/public
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/99-custom.ini:ro
    environment:
      APP_ENV: production
      APP_DEBUG: "true"
      APP_URL: https://esign.sadcpf.org
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: sadc_esign
      DB_USERNAME: sadc_esign
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PASSWORD: null
      REDIS_PORT: 6379
      SANCTUM_STATEFUL_DOMAINS: esign.sadcpf.org
      SESSION_DOMAIN: esign.sadcpf.org
      SESSION_SECURE_COOKIE: "true"
      CORS_ALLOWED_ORIGINS: "https://esign.sadcpf.org"
      REVERB_APP_ID: "54321"
      REVERB_APP_KEY: "4c75bbe4bc2986cca241be38054f10a106a2f5f9"
      REVERB_APP_SECRET: "0a7c3c6eb5a3ccd984d1a7deaa22363040ec542b91162840304efc67f34893da"
      REVERB_HOST: "localhost"
      REVERB_PORT: "8080"
      REVERB_SCHEME: "http"
      RECAPTCHA_SITE_KEY: "6LcPo1YsAAAAAJQr8pn3DrVofmLuffM4rlMCqdpB"
      RECAPTCHA_SECRET_KEY: "6LcPo1YsAAAAALVNAfO3I0iTA5Jr_gA6cjwYz_TU"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - esign-prod-network

  # Queue Worker
  # Queue Worker (Running in 'app' via supervisor)
  # queue:
  #   build:
  #     context: .
  #     dockerfile: docker/production/Dockerfile
  #   container_name: esign_queue
  #   restart: unless-stopped
  #   command: php artisan queue:work --queue=default,high --tries=3 --timeout=300
  #   volumes:
  #     - ./storage:/var/www/html/storage
  #   depends_on:
  #     app:
  #       condition: service_started
  #     redis:
  #       condition: service_healthy
  #   networks:
  #     - esign-prod-network

  # Reverb WebSocket (Running in 'app' via supervisor)
  # reverb:
  #   build:
  #     context: .
  #     dockerfile: docker/production/Dockerfile
  #   container_name: esign_reverb
  #   restart: unless-stopped
  #   command: php artisan reverb:start --host=0.0.0.0 --port=8080
  #   volumes:
  #     # No code volume needed, just config usually
  #     - ./storage:/var/www/html/storage
  #   depends_on:
  #     app:
  #       condition: service_started
  #     redis:
  #       condition: service_healthy
  #   networks:
  #     - esign-prod-network

  # PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: esign_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: sadc_esign
      POSTGRES_USER: sadc_esign
      POSTGRES_PASSWORD: secret
    volumes:
      - pg_data_prod_v2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sadc_esign"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - esign-prod-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: esign_redis_prod
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - esign-prod-network

  # MinIO (S3-compatible storage)
  minio:
    image: minio/minio:latest
    container_name: esign_minio
    restart: unless-stopped
    command: server /data --console-address ":9091"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9091:9091"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - esign-prod-network

networks:
  esign-prod-network:
    driver: bridge

volumes:
  pg_data_prod_v2:
  redis_data:
  minio_data:
  public_data:
  storage_data:
