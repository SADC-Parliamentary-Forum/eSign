version: '3.9'

services:
  # Nginx - Production Web Server
  nginx:
    image: nginx:alpine
    container_name: esign_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:

      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - public_data:/var/www/html/public:ro
      - storage_data:/var/www/html/storage/app/public:ro
    depends_on:
      - app
    networks:
      - esign-prod-network

  # Laravel App (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: docker/production/Dockerfile
    image: esign-app-prod:latest
    container_name: esign_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - public_data:/var/www/html/public
      - ./storage:/var/www/html/storage
      - storage_data:/var/www/html/storage/app/public
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini:ro
    environment:
      APP_ENV: production
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: "${APP_URL}"
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: "${DB_DATABASE}"
      DB_USERNAME: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      REDIS_HOST: redis
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      REDIS_PORT: 6379
      SANCTUM_STATEFUL_DOMAINS: "${SESSION_DOMAIN}"
      SESSION_DOMAIN: "${SESSION_DOMAIN}"
      SESSION_SECURE_COOKIE: "true"
      CORS_ALLOWED_ORIGINS: "${APP_URL}"
      REVERB_APP_ID: "${REVERB_APP_ID}"
      REVERB_APP_KEY: "${REVERB_APP_KEY}"
      REVERB_APP_SECRET: "${REVERB_APP_SECRET}"
      REVERB_HOST: "${REVERB_HOST:-localhost}"
      REVERB_PORT: "${REVERB_PORT:-8080}"
      REVERB_SCHEME: "${REVERB_SCHEME:-http}"
      RECAPTCHA_SITE_KEY: "${RECAPTCHA_SITE_KEY}"
      RECAPTCHA_SECRET_KEY: "${RECAPTCHA_SECRET_KEY}"
    healthcheck:
      test: ["CMD-SHELL", "supervisorctl status php-fpm | grep RUNNING"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - esign-prod-network

  # Queue Worker
  # Queue Worker (Running in 'app' via supervisor)
  # queue:
  #   build:
  #     context: .
  #     dockerfile: docker/production/Dockerfile
  #   container_name: esign_queue
  #   restart: unless-stopped
  #   command: php artisan queue:work --queue=default,high --tries=3 --timeout=300
  #   volumes:
  #     - ./storage:/var/www/html/storage
  #   depends_on:
  #     app:
  #       condition: service_started
  #     redis:
  #       condition: service_healthy
  #   networks:
  #     - esign-prod-network

  # Reverb WebSocket (Running in 'app' via supervisor)
  # reverb:
  #   build:
  #     context: .
  #     dockerfile: docker/production/Dockerfile
  #   container_name: esign_reverb
  #   restart: unless-stopped
  #   command: php artisan reverb:start --host=0.0.0.0 --port=8080
  #   volumes:
  #     # No code volume needed, just config usually
  #     - ./storage:/var/www/html/storage
  #   depends_on:
  #     app:
  #       condition: service_started
  #     redis:
  #       condition: service_healthy
  #   networks:
  #     - esign-prod-network

  # PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: esign_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${DB_DATABASE}"
      POSTGRES_USER: "${DB_USERNAME}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - pg_data_prod_v2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - esign-prod-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: esign_redis_prod
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD}" --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - esign-prod-network

  # MinIO (S3-compatible storage)
  minio:
    image: minio/minio:latest
    container_name: esign_minio
    restart: unless-stopped
    command: server /data --console-address ":9091"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9091:9091"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - esign-prod-network

networks:
  esign-prod-network:
    driver: bridge

volumes:
  pg_data_prod_v2:
  redis_data:
  minio_data:
  public_data:
  storage_data:
