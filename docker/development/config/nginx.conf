server {
    listen 8000 default_server;
    listen [::]:8000 default_server;
    
    root /var/www/html/backend/public;
    index index.php index.html;

    server_name _;

    # Increase timeouts for long-running requests (bulk downloads, etc.)
    client_body_timeout 300s;
    client_header_timeout 300s;
    client_max_body_size 100M;
    keepalive_timeout 300s;
    send_timeout 300s;

    # Laravel API / auth / broadcasting should always hit backend.
    location ^~ /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /sanctum {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /broadcasting {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Vite client + source paths (dev only) proxied through canonical :8000 origin.
    location ^~ /@vite {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location ^~ /@id {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location ^~ /@fs {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location ^~ /src {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location ^~ /node_modules {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # SPA fallback - frontend routes are handled by Vite app.
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Handle PHP execution
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_hide_header X-Powered-By;
        
        # Increase FastCGI timeouts for long-running operations
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
        fastcgi_connect_timeout 60s;
        fastcgi_buffering off;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
