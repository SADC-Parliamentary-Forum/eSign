server {
    listen 3000 default_server;
    listen [::]:3000 default_server;
    
    root /var/www/html/public;
    index index.php index.html;

    server_name _;

    # Allow up to 30 MB uploads (must exceed PHP's upload_max_filesize)
    client_max_body_size 30M;

    # Frontend - serve static files or fallback to index.html (for SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API and health (Laravel /up) - proxy to PHP-FPM
    location ~ ^/(api|sanctum|storage|admin|vendor|up) {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Handle PHP execution
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    
    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
