# Backend API
upstream backend {
    server app:9000;
}

# Frontend
server {
    listen 80;
    listen [::]:80;
    server_name esign.sadcpf.org;
    
    # Trust headers from the reverse proxy
    real_ip_header X-Forwarded-For;
    set_real_ip_from 172.16.0.0/12; # Docker subnet range
    set_real_ip_from 10.0.0.0/8;    # Private networks
    set_real_ip_from 192.168.0.0/16; 

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    # Strict-Transport-Security handled by the host reverse proxy

    # Frontend (SPA) & Static Assets
    root /var/www/html/public;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP Execution Handler
    location ~ \.php$ {
        fastcgi_pass backend;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Storage
    location /storage {
        alias /var/www/html/storage/app/public;
        try_files $uri =404;
    }

    # PHP-FPM status (optional, for monitoring)
    location ~ ^/(status|ping)$ {
        access_log off;
        fastcgi_pass backend;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Reverb WebSockets
    location /app {
        proxy_pass http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /apps {
        proxy_pass http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}


